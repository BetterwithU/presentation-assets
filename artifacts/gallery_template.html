  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", sans-serif;
    background: #0f0f12;
    color: #e5e7eb;
    padding: 24px 20px;
    line-height: 1.5;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  .intro { margin-bottom: 20px; }
  .intro h2 { font-size: 20px; color: #f9fafb; margin-bottom: 6px; }
  .intro p { font-size: 13px; color: #9ca3af; }
  .tabs {
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #27272a;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .tab {
    background: transparent;
    border: none;
    color: #9ca3af;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab:hover { color: #e5e7eb; }
  .tab.active {
    color: #60a5fa;
    border-bottom-color: #60a5fa;
  }
  .badge {
    display: inline-block;
    background: #1f2937;
    color: #9ca3af;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  h1 { font-size: 26px; margin-bottom: 6px; color: #f9fafb; }
  .subtitle { color: #9ca3af; font-size: 14px; margin-bottom: 16px; }
  .meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .meta-item .label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
  .meta-item .value { font-size: 13px; color: #e5e7eb; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 14px;
  }
  .card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #4b5563; }
  .card img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; background: #000; }
  .card-body { padding: 10px 14px; }
  .role {
    display: inline-block;
    background: #1e3a8a;
    color: #dbeafe;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .style-name { font-size: 13px; color: #d1d5db; }
  footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #27272a; font-size: 12px; color: #6b7280; text-align: center; }
</style>
</head>

// Claude가 이 배열을 추천에 맞춰 수정합니다 (2~3개 권장)
const visiblePresets = ["A", "F", "H"];

function render(code) {
  const p = PRESETS[code];
  if (!p) return;

  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.code === code);
  });

  const cards = p.slides.map(s => `
    <div class="card">
      <img src="${s.url}" alt="${s.role}" loading="lazy">
      <div class="card-body">
        <span class="role">${s.role}</span>
        <div class="style-name">${s.style}</div>
      </div>
    </div>
  `).join("");

  document.getElementById("content").innerHTML = `
    <div class="badge">PRESET ${code} · ${p.kr}</div>
    <h1>${p.emoji} ${p.en}</h1>
    <p class="subtitle">${p.tone}</p>
    <div class="meta">
      <div class="meta-item"><div class="label">용도</div><div class="value">${p.usage}</div></div>
      <div class="meta-item"><div class="label">구성 스타일</div><div class="value">${p.styles}</div></div>
      <div class="meta-item"><div class="label">스타일 수</div><div class="value">${p.count}</div></div>
    </div>
    <div class="grid">${cards}</div>
  `;
}

const tabsEl = document.getElementById("tabs");
visiblePresets.forEach(code => {
  const p = PRESETS[code];
  if (!p) return;
  const btn = document.createElement("button");
  btn.className = "tab";
  btn.dataset.code = code;
  btn.textContent = `${p.emoji} Preset ${code} · ${p.kr}`;
  btn.onclick = () => render(code);
  tabsEl.appendChild(btn);
});

if (visiblePresets.length > 0) render(visiblePresets[0]);
</script>
